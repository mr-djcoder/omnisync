<!-- Client-side Interaction for Input Focus and Micro-gestures -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.parentElement.classList.add('ring-1', 'ring-primary/20');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.parentElement.classList.remove('ring-1', 'ring-primary/20');
                });
            });

            // Parallax mouse effect for the glass card
            const card = document.querySelector('.glass-card');
            document.addEventListener('mousemove', (e) => {
                if (window.innerWidth > 768) {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                    card.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                }
            });
        });
    </script>
